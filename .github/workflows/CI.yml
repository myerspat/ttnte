# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: CI

on:
  push:
    branches: [ "develop" ]
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies (MPI)
      run: |
        sudo apt-get update
        sudo apt-get install -y libppl-dev openmpi-bin libopenmpi-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        # Added pytest-mpi to the install list
        python -m pip install flake8 pytest pytest-mpi mpi4py scikit-build-core

        # Install igakit and geomdl
        pip install https://github.com/dalcinl/igakit/archive/refs/heads/master.zip --no-cache-dir
        SETUPTOOLS_USE_CYTHON=1 pip install git+https://github.com/orbingol/NURBS-Python.git --no-cache-dir

        # Install torch
        pip install torch>=2.9.0 --index-url https://download.pytorch.org/whl/cpu --no-cache-dir

        # Install torchTT
        pip install git+https://github.com/ion-g-ion/torchTT

    - name: Build and install ttnte
      run: |
        # Override pyproject.toml using -C cmake.define.USE_CUDA=OFF
        make install VERBOSE=ON USE_CUDA=OFF JOBS=$(nproc)

    # - name: Lint with flake8
    #   run: |
    #     flake8 . --exclude archive --count --select=E9,F63,F7,F82 --show-source --statistics
    #     flake8 . --exclude archive --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test CAD and Mesh
      run: |
        pytest tests/unit/cad
        pytest tests/unit/mesh

    - name: Test Parallel (MPI)
      run: |
        # Use mpirun to launch 2 processes for the parallel tests
        mpirun -n 2 pytest --with-mpi tests/unit/parallel
